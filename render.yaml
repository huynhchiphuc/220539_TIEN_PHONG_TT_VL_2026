services:
  - type: web
    name: comiccraft-backend
    runtime: python
    buildCommand: pip install -r backend/api_base_public/requirements.txt
    startCommand: cd backend/api_base_public && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.3"
      - key: DB_PORT
        value: "12278"
      - key: DB_SSL_MODE
        value: REQUIRED

  - type: web
    name: comiccraft-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
