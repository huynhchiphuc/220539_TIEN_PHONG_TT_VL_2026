services:
  - type: web
    name: comiccraft-backend
    runtime: python
    buildCommand: pip install -r backend/api_base_public/requirements.txt
    startCommand: cd backend/api_base_public && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.3"
      - key: DB_PORT
        value: "12274"
      - key: DB_SSL_MODE
        value: REQUIRED
      - key: FRONTEND_URL
        value: https://huynhchiphuc-comic.vercel.app
      - key: GOOGLE_REDIRECT_URI
        value: https://two20539-tien-phong-tt-vl-2026.onrender.com/api/v1/auth/google/callback
      - key: ALLOW_ORIGINS
        value: '["http://localhost:5173", "https://huynhchiphuc-comic.vercel.app"]'

  - type: web
    name: comiccraft-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://two20539-tien-phong-tt-vl-2026.onrender.com/api/v1
      - key: VITE_API_BASE_URL
        value: https://two20539-tien-phong-tt-vl-2026.onrender.com
